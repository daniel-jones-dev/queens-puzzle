<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queens — Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8F8F5;
      --surface: #fff;
      --text: #1A1A18;
      --text2: #6B6B62;
      --accent: #2B3A5E;
      --border: #E2E2DC;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif; font-size: 14px;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .logo { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 22px; color: var(--accent); text-decoration: none; }
    nav { display: flex; }
    nav a {
      font-size: 14px; font-weight: 500; padding: 0 18px; height: 56px;
      display: flex; align-items: center; text-decoration: none;
      color: var(--text2); border-bottom: 2.5px solid transparent; transition: color 0.12s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); border-bottom-color: var(--accent); }

    main {
      flex: 1; display: flex; justify-content: center;
      padding: 36px 28px 32px;
    }
    .layout {
      display: flex; gap: 28px; width: 100%; max-width: 820px; align-items: flex-start;
    }

    /* ── Workers column ── */
    .workers-col { flex-shrink: 0; width: 260px; display: flex; flex-direction: column; gap: 14px; }

    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 2px;
    }
    .section-title { font-weight: 600; font-size: 14px; }
    .section-meta  { font-size: 12px; color: var(--text2); }

    .worker-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
    }
    .worker-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .worker-name  { font-size: 13px; font-weight: 600; }
    .worker-badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    }
    .badge-running { background: #dcfce7; color: #166534; }
    .badge-idle    { background: var(--border); color: var(--text2); }

    .worker-stat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .worker-stat-label { font-size: 11px; color: var(--text2); }
    .worker-stat-val   { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); }

    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: prog 2.5s ease-in-out infinite alternate; }
    @keyframes prog { from { width: 30%; } to { width: 85%; } }
    .progress-fill.w2 { animation-delay: -1.2s; }

    .worker-actions { display: flex; gap: 6px; margin-top: 12px; }
    .btn {
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 6px;
      border: 1.5px solid var(--border); background: var(--surface); color: var(--text);
      cursor: pointer; transition: background 0.1s;
    }
    .btn:hover { background: var(--bg); }
    .btn-danger { border-color: #fca5a5; color: #b91c1c; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { background: #233050; }

    .add-worker {
      text-align: center; padding: 12px;
      border: 1.5px dashed var(--border); border-radius: 10px;
      font-size: 13px; color: var(--text2); cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }
    .add-worker:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Results column ── */
    .results-col { flex: 1; display: flex; flex-direction: column; gap: 14px; }

    .results-header {
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .found-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 500;
      color: var(--accent);
      background: #EEF1F8; border-radius: 6px; padding: 3px 10px;
    }

    .results-list {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden;
    }
    .result-row {
      display: flex; align-items: center; gap: 0;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .result-row:last-child { border-bottom: none; }
    .result-row:hover { background: var(--bg); }

    .result-preview {
      width: 36px; height: 36px; border-radius: 4px; overflow: hidden;
      border: 1.5px solid rgba(0,0,0,0.1); flex-shrink: 0;
      margin-right: 14px;
    }
    .mini-board {
      display: grid; width: 100%; height: 100%;
    }
    .mini-cell { }

    .result-info { flex: 1; }
    .result-title {
      font-size: 13px; font-weight: 600; line-height: 1.3;
      display: flex; align-items: center; gap: 8px;
    }
    .result-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .diff-badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
      flex-shrink: 0;
    }
    .diff-easy   { background: #dcfce7; color: #166534; }
    .diff-medium { background: #fef3c7; color: #92400e; }
    .diff-hard   { background: #fee2e2; color: #991b1b; }

    .result-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }

    .size-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px; color: var(--text2);
      flex-shrink: 0;
    }

    footer {
      border-top: 1px solid var(--border); padding: 14px 28px;
      display: flex; align-items: center; justify-content: center;
      gap: 14px; font-size: 12px; color: var(--text2); flex-shrink: 0;
    }
    footer a { color: var(--text2); text-decoration: none; }
    footer a:hover { color: var(--text); }
    .sep { opacity: 0.35; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="play.html">♛ Queens</a>
  <nav>
    <a href="play.html">Play</a>
    <a href="solve.html">Solve</a>
    <a href="editor.html">Editor</a>
    <a href="generator.html" class="active">Generator</a>
  </nav>
</header>

<main>
  <div class="layout">

    <!-- Workers -->
    <div class="workers-col">
      <div class="section-head">
        <span class="section-title">Workers</span>
        <span class="section-meta">2 running</span>
      </div>

      <div class="worker-card">
        <div class="worker-header">
          <span class="worker-name">Worker 1</span>
          <span class="worker-badge badge-running">Running</span>
        </div>
        <div class="worker-stat-row">
          <span class="worker-stat-label">Target size</span>
          <span class="worker-stat-val">8×8</span>
        </div>
        <div class="worker-stat-row">
          <span class="worker-stat-label">Candidates tried</span>
          <span class="worker-stat-val">12,847</span>
        </div>
        <div class="worker-stat-row">
          <span class="worker-stat-label">Found</span>
          <span class="worker-stat-val">2</span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="worker-actions">
          <button class="btn btn-danger">Stop</button>
        </div>
      </div>

      <div class="worker-card">
        <div class="worker-header">
          <span class="worker-name">Worker 2</span>
          <span class="worker-badge badge-running">Running</span>
        </div>
        <div class="worker-stat-row">
          <span class="worker-stat-label">Target size</span>
          <span class="worker-stat-val">9×9</span>
        </div>
        <div class="worker-stat-row">
          <span class="worker-stat-label">Candidates tried</span>
          <span class="worker-stat-val">8,203</span>
        </div>
        <div class="worker-stat-row">
          <span class="worker-stat-label">Found</span>
          <span class="worker-stat-val">1</span>
        </div>
        <div class="progress-bar"><div class="progress-fill w2"></div></div>
        <div class="worker-actions">
          <button class="btn btn-danger">Stop</button>
        </div>
      </div>

      <div class="add-worker">+ Add worker</div>
    </div>

    <!-- Results -->
    <div class="results-col">
      <div class="results-header">
        <div class="section-head" style="width:100%">
          <span class="section-title">Found puzzles</span>
          <span class="found-count">3 found</span>
        </div>
      </div>

      <div class="results-list" id="results"></div>
    </div>

  </div>
</main>

<footer>
  <span>Made by <a href="https://github.com/daniel-jones-dev">Daniel Jones</a></span>
  <span class="sep">·</span>
  <a href="https://github.com/daniel-jones-dev/queens-puzzle">GitHub</a>
  <span class="sep">·</span>
  <span>Made popular by <a href="https://www.linkedin.com/games/queens/">LinkedIn Queens</a></span>
</footer>

<script>
  const PALETTE = ["#bba3e2","#ffc992","#96beff","#b3dfa0","#dfdfdf","#ff7b60","#e6f388","#b9b29e"];

  // Three sample found puzzles
  const RESULTS = [
    {
      size: 8, diff: 'Easy', diffClass: 'diff-easy',
      sub: 'Worker 1 · 2 min ago',
      // 8×8 region map (flattened, 64 values)
      regions: [
        [0,0,0,1,1,1,2,2],
        [0,0,3,1,1,2,2,2],
        [0,3,3,3,4,4,2,5],
        [6,3,3,4,4,4,5,5],
        [6,6,3,4,7,4,5,5],
        [6,6,6,7,7,7,5,5],
        [6,6,7,7,7,7,7,5],
        [6,7,7,7,7,7,7,7],
      ]
    },
    {
      size: 8, diff: 'Medium', diffClass: 'diff-medium',
      sub: 'Worker 1 · 5 min ago',
      regions: [
        [0,0,1,1,1,2,2,2],
        [0,0,1,3,2,2,2,4],
        [0,3,3,3,3,2,4,4],
        [5,5,3,3,6,4,4,4],
        [5,5,5,6,6,6,4,7],
        [5,5,6,6,6,7,7,7],
        [5,5,5,6,7,7,7,7],
        [5,5,5,5,7,7,7,7],
      ]
    },
    {
      size: 9, diff: 'Hard', diffClass: 'diff-hard',
      sub: 'Worker 2 · 1 min ago',
      // 9×9 with 9 regions (use 9 colors, cycling palette)
      regions: null // rendered as flat colour for 9×9
    },
  ];

  function buildMiniBoard(container, regions, n) {
    const board = document.createElement('div');
    board.className = 'mini-board';
    board.style.gridTemplateColumns = `repeat(${n},1fr)`;
    board.style.gridTemplateRows    = `repeat(${n},1fr)`;
    if (!regions) {
      // Show a simple coloured grid for 9×9
      for (let i = 0; i < n*n; i++) {
        const c = document.createElement('div');
        c.className = 'mini-cell';
        c.style.background = PALETTE[i % PALETTE.length];
        board.appendChild(c);
      }
    } else {
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const el = document.createElement('div');
          el.className = 'mini-cell';
          el.style.background = PALETTE[regions[r][c]];
          board.appendChild(el);
        }
      }
    }
    container.appendChild(board);
  }

  const list = document.getElementById('results');
  RESULTS.forEach((p, idx) => {
    const row = document.createElement('div');
    row.className = 'result-row';

    // Mini preview
    const preview = document.createElement('div');
    preview.className = 'result-preview';
    buildMiniBoard(preview, p.regions, p.size);

    // Info
    const info = document.createElement('div');
    info.className = 'result-info';
    info.innerHTML = `
      <div class="result-title">
        Puzzle ${idx + 1}
        <span class="size-tag">${p.size}×${p.size}</span>
        <span class="diff-badge ${p.diffClass}">${p.diff}</span>
      </div>
      <div class="result-sub">${p.sub}</div>
    `;

    // Actions
    const actions = document.createElement('div');
    actions.className = 'result-actions';
    actions.innerHTML = `
      <button class="btn">Edit</button>
      <button class="btn btn-primary">Play</button>
    `;

    row.appendChild(preview);
    row.appendChild(info);
    row.appendChild(actions);
    list.appendChild(row);
  });
</script>
</body>
</html>
